<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
    <title>Skills Test</title>

        <style>
            .navbar {
            background: linear-gradient(90deg, #292e5f, #2197e7);
            }

            .nav-link {
                font-weight: 600;
                color: white !important;
                transition: background-color 0.3s, border-radius 0.3s;
            }

            .nav-link:hover {
                background-color: rgba(255, 255, 255, 0.2);
                border-radius: 20px;
            }

            .big {
                padding: 100px 20px 60px;
                background: linear-gradient(to right, #2197e7, #292e5f);
                color: white;
                text-align: center;
            }

            .big img {
                max-width: 200px;
                border-radius: 50%;
                border: 5px solid white;
                margin-bottom: 20px;
            }

            section {
                padding: 60px 0;
            }

            .project-card img {
                width: 100%;
                height: auto;
                object-fit: cover;
                border-radius: 12px;
            }

            .project-card {
                background: #fff;
                border-radius: 15px;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
                padding: 20px;
                margin-bottom: 30px;
                transition: transform 0.3s;
            }

            .project-card:hover {
                transform: translateY(-5px);
            }

            .footer {
                text-align: center;
            }

            .social-icon {
                color: white;
                margin: 0 10px;
                font-size: 20px;
                transition: color 0.3s;
            }

            .social-icon:hover {
                color: #ddd;
            }

            .btn {
                position: relative;
                color: white;
                border-radius: 30px;
                overflow: hidden;
                padding: 10px 20px;
                border: none;
                background: none;
                cursor: pointer;
                z-index: 1;
            }

            .btn::before {
                content: "";
                position: absolute;
                top: 0; left: 0;
                width: 100%; height: 100%;
                background: linear-gradient(to left, #292e5f, #2197e7);
                transition: opacity 1s;
                z-index: -1;
                opacity: 1;
            }

            .btn::after {
                content: "";
                position: absolute;
                top: 0; left: 0;
                width: 100%; height: 100%;
                background: linear-gradient(to right, #292e5f, #2197e7);
                transition: opacity 1s;
                z-index: -1;
                opacity: 0;
            }

            .btn:hover::after {
                opacity: 1;
            }

            .btn:hover::before {
                opacity: 0;
            }

            .btn:hover {
                color: black;
            }
            body {
                background: #ebf8ff;
                font-family: "Josefin Sans", sans-serif;
                color: #292e5f;
                overflow-x: hidden;
            }

            .wrapper {
                max-width: 850px;
                margin: 60px auto;
                animation: fadeIn 1.5s ease;
            }

            .card {
                border: none;
                border-radius: 20px;
                box-shadow: 0 4px 25px rgba(0, 0, 0, 0.1);
                overflow: hidden;
                transition: transform 0.4s ease, box-shadow 0.4s ease;
            }

            .card:hover {
                transform: scale(1.02);
                box-shadow: 0 6px 30px rgba(0, 0, 0, 0.15);
            }

            .card-header {
                background: linear-gradient(to left, #292e5f, #2197e7);
                color: white;
                text-align: center;
                font-size: 1.8rem;
                font-weight: 700;
                padding: 25px 0;
                letter-spacing: 1px;
                animation: slideDown 1s ease;
            }

            label {
                font-weight: 500;
                margin-top: 10px;
            }

            input, select {
                border-radius: 8px !important;
                transition: 0.3s ease;
            }

            input:focus, select:focus {
                border-color: #2197e7;
                box-shadow: 0 0 6px #292e5f;
            }

            .btn-calc {
                background-color: #292e5f;
                border: none;
                color: white;
                font-weight: 600;
                width: 100%;
                border-radius: 8px;
                padding: 12px;
                transition: 0.3s ease;
                letter-spacing: 0.5px;
            }

            .btn-calc:hover {
                background-color: #2197e7;
                transform: translateY(-2px);
                box-shadow: 0 5px 15px #292e5f;
            }

            #student_info, #summary, #output {
                background-color: #c4f2ff;
                color: white;
                border-radius: 10px;
                padding: 15px;
                margin-top: 15px;
                border-left: 5px solid #2197e7;
                opacity: 0;
                transform: translateY(15px);
                transition: opacity 0.8s ease, transform 0.8s ease;
            }

            .show {
                opacity: 1 !important;
                transform: translateY(0) !important;
            }

            #output {
                font-size: 1.5rem;
                text-align: center;
                font-weight: bold;
                padding: 20px;
                color: white;
                background: #c4f2ff;
                animation: popIn 0.8s ease forwards;
            }

            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(30px); }
                to { opacity: 1; transform: translateY(0); }
            }

            @keyframes slideDown {
                from { transform: translateY(-30px); opacity: 0; }
                to { transform: translateY(0); opacity: 1; }
            }

            @keyframes popIn {
                0% { transform: scale(0.8); opacity: 0; }
                100% { transform: scale(1); opacity: 1; }
            }

        </style>
        <py-config>
            packages =['numpy', 'matplotlib']
        </py-config>
</head>

<body>

    <div class="wrapper">
        <div class="card">
            <div class="card-header">Attendance Checker</div>
            <div class="card-body px-4">
                <div class="row">
                    <div class="col-md-6"><label>Monday</label><input type="number" class="form-control" id="monday"></div>
                    <div class="col-md-6"><label>Tuesday</label><input type="number" class="form-control" id="tuesday"></div>
                    <div class="col-md-6"><label>Wednesday</label><input type="number" class="form-control" id="wednesday"></div>
                    <div class="col-md-6"><label>Thursday</label><input type="number" class="form-control" id="thursday"></div>
                    <div class="col-md-14"><label>Friday</label><input type="number" class="form-control" id="friday"></div>
                </div>

                <button class="btn btn-calc mt-4" py-click="checkAttendance">Check</button>

                <div id="output"></div>
                <py-script src="main.py"></py-script>

            </div>
        </div>
    </div>

    </script>
      <footer class="footer">
        <div class="container">
          <p>OB Montessori Center Greenhills Campus</p>
          <p>&copy;VANNA SANGREO</p>
        </div>
      </footer>
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
