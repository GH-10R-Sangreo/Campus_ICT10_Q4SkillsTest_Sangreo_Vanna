<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
    <title>Seatwork 2</title>

        <style>
            .navbar {
            background: linear-gradient(90deg, #292e5f, #2197e7);
            }

            .nav-link {
                font-weight: 600;
                color: white !important;
                transition: background-color 0.3s, border-radius 0.3s;
            }

            .nav-link:hover {
                background-color: rgba(255, 255, 255, 0.2);
                border-radius: 20px;
            }
            
            p {
                font-size: 10px;
                text-align: center;
            }

            section {
                padding: 60px 0;
            }

            .btn {
                position: relative;
                color: white;
                border-radius: 30px;
                overflow: hidden;
                padding: 10px 20px;
                border: none;
                background: none;
                cursor: pointer;
                z-index: 1;
            }

            .btn::before {
                content: "";
                position: absolute;
                top: 0; left: 0;
                width: 100%; height: 100%;
                background: linear-gradient(to left, #292e5f, #2197e7);
                transition: opacity 1s;
                z-index: -1;
                opacity: 1;
            }

            .btn::after {
                content: "";
                position: absolute;
                top: 0; left: 0;
                width: 100%; height: 100%;
                background: linear-gradient(to right, #292e5f, #2197e7);
                transition: opacity 1s;
                z-index: -1;
                opacity: 0;
            }

            .btn:hover::after {
                opacity: 1;
            }

            .btn:hover::before {
                opacity: 0;
            }

            .btn:hover {
                color: black;
            }
            body {
                background: #ebf8ff;
                font-family: "Josefin Sans", sans-serif;
                color: #292e5f;
                overflow-x: hidden;
            }

            .wrapper {
                max-width: 850px;
                margin: 60px auto;
                animation: fadeIn 1.5s ease;
            }

            .card {
                border: none;
                border-radius: 20px;
                box-shadow: 0 4px 25px rgba(0, 0, 0, 0.1);
                overflow: hidden;
                transition: transform 0.4s ease, box-shadow 0.4s ease;
            }

            .card:hover {
                transform: scale(1.02);
                box-shadow: 0 6px 30px rgba(0, 0, 0, 0.15);
            }

            .card-header {
                background: linear-gradient(to left, #292e5f, #2197e7);
                color: white;
                text-align: center;
                font-size: 1.8rem;
                font-weight: 700;
                padding: 25px 0;
                letter-spacing: 1px;
                animation: slideDown 1s ease;
            }

            label {
                font-weight: 500;
                margin-top: 10px;
            }

            input, select {
                border-radius: 8px !important;
                transition: 0.3s ease;
            }

            input:focus, select:focus {
                border-color: #2197e7;
                box-shadow: 0 0 6px #292e5f;
            }

            .btn-get {
                background-color: #292e5f;
                border: none;
                color: white;
                font-weight: 600;
                width: 100%;
                border-radius: 8px;
                padding: 12px;
                transition: 0.3s ease;
                letter-spacing: 0.5px;
            }

            .btn-get:hover {
                background-color: #2197e7;
                transform: translateY(-2px);
                box-shadow: 0 5px 15px #292e5f;
            }

            .show {
                opacity: 1 !important;
                transform: translateY(0) !important;
            }

            #output {
                font-size: 1.8rem;
                font-weight: bold;
                text-align: center;
                animation: popIn 0.8s ease forwards;
            }

            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(30px); }
                to { opacity: 1; transform: translateY(0); }
            }

            @keyframes slideDown {
                from { transform: translateY(-30px); opacity: 0; }
                to { transform: translateY(0); opacity: 1; }
            }

            @keyframes popIn {
                0% { transform: scale(0.8); opacity: 0; }
                100% { transform: scale(1); opacity: 1; }
            }
        </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
            </button>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Sign Up</a></li>
                <li class="nav-item"><a class="nav-link" href="checker.html">Team Checker</a></li>
                <li class="nav-item"><a class="nav-link" href="class.html">Player List</a></li>
                </ul>
        </div>
    </nav>

    <div class="wrapper">
        <div class="card">
            <div class="card-header">My Grade 10 - Ruby Classmates</div>

            <div class="card-body px-4">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label>Classmate's Name</label>
                        <input type="text" class="form-control" id="name1" placeholder="Enter name">
                    </div>
                    <div class="col-md-6">
                        <label>Classmate's Section</label>
                        <input type="text" class="form-control" id="section1" placeholder="Enter section">
                    </div>
                    <div class="col-md-14">
                        <label">Classmate's Favorite Subject</label>
                        <input type="text" class="form-control" id="subject1" placeholder="Enter favorite subject">
                    </div> 

                    <button class="btn btn-get mt-4" py-click="add_classmate">Add Classmate</button>
                    <button class="btn btn-get mt-4" py-click="show">Show Classmates</button>

                </div>
            </div>
        </div>
    
    <br>
    <br>
    
    <py-script src="main.py"></py-script>

    <div id="output"></div>
    
    <br>
    <br>

    </script>
        <div class="container">
          <p>OB Montessori Center Greenhills Campus</p>
          <p>&copy; VANNA SANGREO</p>
        </div>
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    </body>
</html>
